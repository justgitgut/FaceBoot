<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FaceBoot Docs</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #18212f;
        --muted: #5d6878;
        --accent: #1877f2;
        --border: #d7dfeb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 18px 48px rgba(21, 41, 79, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 2rem;
      }

      p {
        line-height: 1.6;
      }

      .muted {
        color: var(--muted);
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      a:hover,
      a:focus-visible {
        text-decoration: underline;
      }

      ul {
        padding-left: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>FaceBoot Docs</h1>
        <p class="muted">Static pages intended for GitHub Pages hosting.</p>
        <p>Use the privacy policy page below as the public URL for the Chrome Web Store listing.</p>
        <ul>
          <li><a href="./privacy/">Privacy Policy</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
